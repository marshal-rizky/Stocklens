# CI: jalankan test cepat di setiap push & PR.
# Test slow (butuh torch/CLIP) sengaja TIDAK jalan di CI — terlalu berat;
# jalankan lokal dengan `pytest -m slow` sebelum merge perubahan model.
name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps ringan (tanpa torch stack)
        run: pip install numpy opencv-python-headless pillow fastapi httpx python-multipart pytest
      - name: Test cepat
        run: pytest -v
