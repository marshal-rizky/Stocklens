{% extends "base.html" %}
{% block title %}Opname Foto - StokLens{% endblock %}
{% block content %}
<div class="halaman-header">
  <a class="kembali" href="/ui/opname">
    <svg aria-hidden="true" focusable="false"
         viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round">
      <path d="m12 19-7-7 7-7"/>
      <path d="M19 12H5"/>
    </svg>
    <span>Kembali</span>
  </a>
</div>
<h1>Opname Foto</h1>

<div id="form-state">
  <p class="hint">1 foto = 1 sub-segmen rak, jangan tumpang tindih</p>

  <div class="field">
    <label for="input-lokasi-rak">Lokasi rak (opsional)</label>
    <input type="text" id="input-lokasi-rak" autocomplete="off">
  </div>

  <div class="field">
    <label for="select-guided">Produk (guided, opsional)</label>
    <select id="select-guided" class="select-input">
      <option value="">— otomatis —</option>
    </select>
  </div>

  <div class="field">
    <label for="input-foto">Foto rak</label>
    <input type="file" id="input-foto" accept="image/*" capture="environment" multiple class="sr-only-input">
    <button type="button" class="btn foto-btn" id="tombol-ambil-foto">
      <svg aria-hidden="true" focusable="false"
           viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/>
        <circle cx="12" cy="13" r="3"/>
      </svg>
      <span>Ambil Foto</span>
    </button>
    <div id="thumbnail-grid" class="thumbnail-grid"></div>
    <p class="field-error hidden" id="error-foto">Minimal 1 foto diperlukan</p>
  </div>

  <button type="button" class="btn btn-cta btn-full" id="tombol-scan">Analisis foto</button>
</div>

<div id="laporan-hasil" class="hidden">
  <div id="laporan-container"></div>
  <a class="btn btn-full" href="/ui/opname/foto">Opname lagi</a>
</div>
{% endblock %}

{% block skrip %}
<script src="/static/report_view.js"></script>
<script src="/static/opname_foto.js"></script>
{% endblock %}
