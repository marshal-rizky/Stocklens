{% extends "base.html" %}
{% block title %}Opname Video - StokLens{% endblock %}
{% block content %}
<div class="halaman-header">
  <a class="kembali" href="/ui/opname">
    <svg aria-hidden="true" focusable="false"
         viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round">
      <path d="m12 19-7-7 7-7"/>
      <path d="M19 12H5"/>
    </svg>
    <span>Kembali</span>
  </a>
</div>
<h1>Opname Video</h1>

<div id="form-state">
  <div class="field">
    <label for="input-video">Video rak</label>
    <input type="file" id="input-video" accept="video/*">
    <p class="field-error hidden" id="error-video">Pilih video dulu</p>
  </div>

  <div class="field">
    <label for="select-count-mode">Mode hitung</label>
    <select id="select-count-mode" class="select-input">
      <option value="line">Line (sweep — default)</option>
      <option value="track">Track (kamera statis)</option>
    </select>
    <p class="hint" id="hint-count-mode">
      Line: video sapuan (sweep), barang dihitung saat menyeberang garis tengah — anti dobel hitung.
    </p>
  </div>

  <div class="field">
    <label for="input-lokasi-rak">Lokasi rak (opsional)</label>
    <input type="text" id="input-lokasi-rak" autocomplete="off">
  </div>

  <button type="button" class="btn btn-cta btn-full" id="tombol-scan">Proses video</button>
</div>

<div id="laporan-hasil" class="hidden">
  <div id="laporan-container"></div>
  <a class="btn btn-full" href="/ui/opname/video">Opname lagi</a>
</div>
{% endblock %}

{% block skrip %}
<script src="/static/report_view.js"></script>
<script src="/static/opname_video.js"></script>
{% endblock %}
