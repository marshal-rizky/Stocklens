{% extends "base.html" %}
{% block title %}Barang - StokLens{% endblock %}
{% block content %}
<h1>Barang</h1>

<div class="search-wrap">
  <label for="cari-barang">Cari barang</label>
  <input type="search" id="cari-barang" class="search-input" placeholder="Cari barang...">
</div>

<div id="daftar-barang" class="produk-list"></div>
{% endblock %}

{% block fab %}
<a class="fab" href="/ui/barang/baru" aria-label="Tambah barang">
  <svg aria-hidden="true" focusable="false"
       viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
       stroke-linecap="round" stroke-linejoin="round">
    <path d="M5 12h14"/>
    <path d="M12 5v14"/>
  </svg>
</a>
{% endblock %}

{% block skrip %}
<script src="/static/barang.js"></script>
{% endblock %}
